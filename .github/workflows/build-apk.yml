name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create local.properties
        run: |
          echo "RELAY_API_KEY=default_api_key_for_ci" > local.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SMS-Payment-Gateway-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create local.properties
        run: |
          echo "RELAY_API_KEY=default_api_key_for_ci" > local.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: SMS Payment Gateway v${{ steps.version.outputs.version }}
          body: |
            ## SMS Payment Gateway - بوابة دفع SMS

            ### تحميل APK
            قم بتحميل ملف APK من الأصول أدناه وتثبيته على هاتف Android.

            ### ما الجديد
            - تم بناء التطبيق تلقائياً من آخر تحديث للكود

            ### المتطلبات
            - Android 8.0 (API 26) أو أعلى
            - صلاحية قراءة الرسائل SMS
            - اتصال بالإنترنت

            ### طريقة الاستخدام
            1. ثبّت APK على الهاتف
            2. افتح التطبيق واحصل على API Key
            3. اضبط Relay Server URL من الإعدادات
            4. استخدم الـ API من أي موقع عبر Relay Server
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}