name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: بناء APK (نسختان)
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ الكود
        uses: actions/checkout@v4

      - name: إنشاء local.properties
        run: echo "RELAY_API_KEY=${RELAY_API_KEY:-default_api_key_for_ci}" > local.properties

      - name: إعداد JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: منح صلاحية تشغيل gradlew
        run: chmod +x gradlew

      - name: بناء كلتا النسختين
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ─── رفع نسخة الهواتف الحديثة (Android 8+) ───────────────────────────
      - name: رفع APK الهواتف الحديثة (Android 8+)
        uses: actions/upload-artifact@v4
        with:
          name: SMS-Gateway-Modern-Android8Plus
          path: app/build/outputs/apk/modern/debug/app-modern-debug.apk
          retention-days: 30

      # ─── رفع نسخة الهواتف القديمة (Android 5+) ───────────────────────────
      - name: رفع APK الهواتف القديمة (Android 5+)
        uses: actions/upload-artifact@v4
        with:
          name: SMS-Gateway-Legacy-Android5Plus
          path: app/build/outputs/apk/legacy/debug/app-legacy-debug.apk
          retention-days: 30

  release:
    name: إنشاء إصدار GitHub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - name: استنساخ الكود
        uses: actions/checkout@v4

      - name: إنشاء local.properties
        run: echo "RELAY_API_KEY=${RELAY_API_KEY:-default_api_key_for_ci}" > local.properties

      - name: إعداد JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: منح صلاحية تشغيل gradlew
        run: chmod +x gradlew

      - name: بناء Debug APKs
        run: ./gradlew assembleDebug --no-daemon

      - name: بناء Release APKs (غير موقّعة)
        run: ./gradlew assembleRelease --no-daemon

      - name: استخراج رقم الإصدار
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: إنشاء إصدار GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: بوابة دفع SMS v${{ steps.version.outputs.version }}
          body: |
            ## بوابة دفع SMS — إصدار جديد 🚀

            ### 📱 اختر النسخة المناسبة لهاتفك

            | الملف | الهواتف المدعومة |
            |-------|-----------------|
            | `app-modern-debug.apk` | Android 8.0+ (الأحدث والأفضل) |
            | `app-legacy-debug.apk` | Android 5.0+ (للهواتف القديمة) |

            ### ✨ المميزات
            - رابط API عام يُنشأ تلقائياً لكل جهاز
            - SmartTunnel: اتصال مباشر بدون إعداد
            - دعم Vodafone Cash, Orange Money, Etisalat Cash
            - واجهة عربية كاملة

            ### 📋 المتطلبات
            - صلاحية قراءة رسائل SMS
            - اتصال بالإنترنت
          files: |
            app/build/outputs/apk/modern/debug/app-modern-debug.apk
            app/build/outputs/apk/legacy/debug/app-legacy-debug.apk
            app/build/outputs/apk/modern/release/app-modern-release-unsigned.apk
            app/build/outputs/apk/legacy/release/app-legacy-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
