name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: بناء APK للاختبار
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ الكود
        uses: actions/checkout@v4

      - name: إنشاء local.properties
        run: |
          echo "RELAY_API_KEY=${RELAY_API_KEY:-default_api_key_for_ci}" > local.properties

      - name: إعداد JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: منح صلاحية تشغيل gradlew
        run: chmod +x gradlew

      - name: بناء Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: رفع Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SMS-Payment-Gateway-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    name: إنشاء إصدار GitHub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - name: استنساخ الكود
        uses: actions/checkout@v4

      - name: إنشاء local.properties
        run: |
          echo "RELAY_API_KEY=${RELAY_API_KEY:-default_api_key_for_ci}" > local.properties

      - name: إعداد JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: منح صلاحية تشغيل gradlew
        run: chmod +x gradlew

      - name: بناء Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: بناء Release APK (غير موقّع)
        run: ./gradlew assembleRelease --no-daemon

      - name: استخراج رقم الإصدار
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: إنشاء إصدار GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: بوابة دفع SMS v${{ steps.version.outputs.version }}
          body: |
            ## بوابة دفع SMS — إصدار جديد

            ### تحميل APK
            حمّل ملف APK من الأصول أدناه وثبّته على هاتف Android.

            ### المستجدات
            - بناء تلقائي من آخر تحديث للكود
            - رابط API مباشر يُنشئه الجهاز تلقائياً
            - واجهة عربية كاملة

            ### المتطلبات
            - Android 8.0 (API 26) أو أعلى
            - صلاحية قراءة رسائل SMS
            - اتصال بالإنترنت
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
